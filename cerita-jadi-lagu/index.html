<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cerita Menjadi Lirik Lagu</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="container">
      <!-- Banner Sampul -->
      <div class="banner">
        <img src="assets/banner.png" alt="Banner Cerita Menjadi Lagu" />
      </div>
      <h1>Cerita Menjadi Lirik Lagu</h1>

      <!-- Logo -->
      <div class="logo">
        <img src="assets/logo.png" alt="Logo" />
      </div>
      <p>Tulis cerita, lalu klik Buat Lirik Lagu.</p>
      <textarea
        id="story"
        rows="10"
        placeholder="Tulis cerita Anda di sini..."
      ></textarea>
      <br />
      <button onclick="generateSong()">Buat Lagu</button>

      <div id="result"></div>
    </div>

    <script src="js/story.js"></script>
  </body>
</html>
